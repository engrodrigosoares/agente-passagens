name: Agente Autônomo de Passagens 24/7

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: |
          pip install google-search-results pandas matplotlib requests

      - name: Executar Agente de Passagens
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python agente.py

      - name: Salvar Histórico do Banco de Dados
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "bot: atualiza historico_precos.db [skip ci]"
          file_pattern: "historico_precos.db"
