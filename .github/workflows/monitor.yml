name: Agente Autônomo de Passagens 24/7

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: |
          pip install google-search-results pandas matplotlib requests

      - name: Executar Agente de Passagens
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python agente.py

      - name: Salvar Histórico e Dados Web
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "bot: atualiza historico e dados web [skip ci]"
          file_pattern: "historico_precos.db dados.json grafico_precos.png"
