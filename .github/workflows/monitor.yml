Aqui está o código completo e atualizado do arquivo **`.github/workflows/monitor.yml`**, com o agendamento para 8 vezes ao dia (a cada 3 horas), as permissões corretas e as versões mais recentes das Actions.

Basta copiar tudo e colar substituindo o conteúdo atual no GitHub:

```yaml
name: Agente Autônomo de Passagens 24/7

on:
  schedule:
    # Executa a cada 3 horas (8 vezes ao dia)
    - cron: '0 */3 * * *'
  workflow_dispatch:

# Permissão para o bot atualizar e salvar o banco de dados historico_precos.db no repositório
permissions:
  contents: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: |
          pip install google-search-results pandas matplotlib requests

      - name: Executar Agente de Passagens
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python agente.py

      - name: Salvar Histórico do Banco de Dados
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "bot: atualiza historico_precos.db [skip ci]"
          file_pattern: "historico_precos.db"

```
